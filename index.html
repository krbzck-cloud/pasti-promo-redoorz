        .logo-circle { width: 70px; height: 70px; background: white; border-radius: 50%; display: flex; justify-content: center; align-items: center; margin: 0 auto 15px; font-size: 35px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }

<div id="toast" class="toast">Kode berhasil disalin!</div>
    <script>
    async function copyCode(id) {
    const text = document.getElementById(id).textContent;

    try {
        if (navigator.clipboard && window.isSecureContext) {
            await navigator.clipboard.writeText(text);
        } else {
            const input = document.createElement("textarea");
            input.value = text;
            document.body.appendChild(input);
            input.select();
            document.execCommand("copy");
            document.body.removeChild(input);
        }

        document.getElementById("toast").style.display = "block";
        setTimeout(() => {
            document.getElementById("toast").style.display = "none";
        }, 2000);

        document.getElementById("openAppBtn").style.display = "block";

    } catch (e) {
        alert("Silakan salin kode secara manual.");
    }
}
    function goToApp() {

    const ua = navigator.userAgent || "";

    if (ua.includes("FBAN") || ua.includes("FBAV")) {
        window.location.href = "https://www.reddoorz.com/";
        return;
    }

    if (/Android/i.test(ua)) {

        const start = Date.now();

        window.location.href = "reddoorz://";

        setTimeout(function () {
            if (Date.now() - start < 2500) {
                window.location.href =
                "https://play.google.com/store/apps/details?id=com.reddoorz.app";
            }
        }, 1500);

    } else {

        window.location.href = "https://www.reddoorz.com/";

    }
}
    function shareWA() {
        window.open("https://wa.me/?text=" + encodeURIComponent("Cek promo RedDoorz: " + window.location.href));
    }
    function shareFB() {
        window.open("https://www.facebook.com/sharer/sharer.php?u=" + encodeURIComponent(window.location.href));
    }
</script>
