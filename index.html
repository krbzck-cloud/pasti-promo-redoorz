<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kode Promo RedDoorz Viral</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(135deg,#e74c3c,#c0392b);
  color:#fff;
  text-align:center;
}

.hero{
  padding:30px 20px;
}

.hero h1{
  margin:0;
  font-size:26px;
}

.container{
  max-width:500px;
  margin:auto;
  padding:10px;
}

.card{
  background:#fff;
  color:#333;
  margin:10px 0;
  padding:12px;
  border-radius:12px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.code{
  font-weight:bold;
  font-size:14px;
  word-break:break-all;
}

button{
  background:#e74c3c;
  border:none;
  color:#fff;
  padding:8px 10px;
  border-radius:8px;
  cursor:pointer;
}

button:hover{
  background:#c0392b;
}

.cta{
  margin:15px 0;
}

.cta button{
  margin:5px;
}

.toast{
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  background:#2ecc71;
  padding:10px 15px;
  border-radius:8px;
  display:none;
}
</style>
</head>

<body>

<div class="hero">
<h1>🔥 Kode Promo RedDoorz Viral</h1>
<p>Copy & gunakan untuk diskon hotel</p>
</div>

<div class="container">

<div class="cta">
<button id="openAppBtn" onclick="openRedDoorz()" style="display:none;">
🚀 Buka Aplikasi RedDoorz
</button>
</div>

<div class="card">
<div class="code">RDAFFMRREDOORZ01</div>
<button onclick="copyText('RDAFFMRREDOORZ01')">Copy</button>
</div>

<div class="card">
<div class="code">RDAFFMRREDOORZ</div>
<button onclick="copyText('RDAFFMRREDOORZ')">Copy</button>
</div>

<div class="card">
<div class="code">RDAFFREDOORZPROMOHEMAT</div>
<button onclick="copyText('RDAFFREDOORZPROMOHEMAT')">Copy</button>
</div>

<div class="card">
<div class="code">RDAFFPROMO1TH</div>
<button onclick="copyText('RDAFFPROMO1TH')">Copy</button>
</div>

<div class="card">
<div class="code">RDAFFMRREDOORZ83</div>
<button onclick="copyText('RDAFFMRREDOORZ83')">Copy</button>
</div>

<!-- SHARE BUTTON -->
<div class="cta">
<button onclick="shareWA()">📲 Share WhatsApp</button>
<button onclick="shareFB()">📘 Share Facebook</button>
</div>

</div>

<div class="toast" id="toast"></div>

<script>

function copyText(text){
  navigator.clipboard.writeText(text);
  showToast("Kode disalin: " + text);

  document.getElementById("openAppBtn").style.display="block";
}

function openRedDoorz(){

  const ua = navigator.userAgent;

  if(/android/i.test(ua)){
    window.location.href =
    "intent://#Intent;scheme=reddoorz;package=com.reddoorz.app;end";

    setTimeout(()=>{
      window.location.href =
      "https://play.google.com/store/apps/details?id=com.reddoorz.app";
    },1500);
  }

  else if(/iPhone|iPad|iPod/.test(ua)){
    window.location.href = "https://apps.apple.com/";
  }

  else{
    window.location.href = "https://www.reddoorz.com/";
  }
}

function shareWA(){
  const text = encodeURIComponent(
`🔥 Promo RedDoorz Viral!

RDAFFMRREDOORZ01
RDAFFMRREDOORZ
RDAFFREDOORZPROMOHEMAT

👉 Pakai sekarang sebelum habis!`
  );

  window.open("https://wa.me/?text="+text,"_blank");
}

function shareFB(){
  window.open(
  "https://www.facebook.com/sharer/sharer.php?u="+
  encodeURIComponent(window.location.href),
  "_blank"
  );
}

function showToast(msg){
  const t=document.getElementById("toast");
  t.innerText=msg;
  t.style.display="block";

  setTimeout(()=>{t.style.display="none";},2000);
}

</script>

</body>
</html>
